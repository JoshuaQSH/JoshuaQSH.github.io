{{ $profile := .Site.Params.profile }}
{{ with $profile }}
  <section class="profile-hero">
    <img
      class="profile-avatar"
      src="{{ .avatar | relURL }}"
      alt="{{ .avatarAlt | default (printf "Portrait of %s" .name) }}"
      loading="lazy"
    />
    <div class="profile-copy">
      <h1>{{ .name }}</h1>
      {{ with .title }}<p class="profile-title">{{ . }}</p>{{ end }}
      {{ with .description }}<p class="profile-description">{{ . }}</p>{{ end }}
    </div>
    <div class="profile-links" aria-label="Profile links">
      {{ with .github }}
        <a class="profile-icon-link" href="{{ . }}" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2C6.48 2 2 6.58 2 12.23c0 4.52 2.87 8.35 6.84 9.71.5.1.66-.22.66-.49 0-.24-.01-.87-.01-1.71-2.78.62-3.37-1.37-3.37-1.37-.45-1.18-1.11-1.49-1.11-1.49-.91-.64.07-.63.07-.63 1.01.07 1.54 1.06 1.54 1.06.9 1.57 2.36 1.12 2.94.86.09-.67.35-1.12.63-1.37-2.22-.26-4.56-1.14-4.56-5.08 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.71 0 0 .84-.27 2.75 1.05A9.3 9.3 0 0112 6.8c.85 0 1.71.12 2.51.35 1.9-1.32 2.75-1.05 2.75-1.05.55 1.41.2 2.45.1 2.71.64.72 1.03 1.63 1.03 2.75 0 3.95-2.35 4.82-4.58 5.07.36.32.68.94.68 1.89 0 1.37-.01 2.48-.01 2.81 0 .27.17.6.67.49A10.3 10.3 0 0022 12.23C22 6.58 17.52 2 12 2z"/></svg>
        </a>
      {{ end }}
      {{ with .email }}
        <a class="profile-icon-link" href="{{ . }}" aria-label="Email">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 5h18a1 1 0 011 1v12a1 1 0 01-1 1H3a1 1 0 01-1-1V6a1 1 0 011-1zm9 7.2L4.4 7h15.2L12 12.2zm-8 4.8h16V8.2l-7.4 5.1a1 1 0 01-1.2 0L4 8.2V17z"/></svg>
        </a>
      {{ end }}
      {{ with .linkedin }}
        <a class="profile-icon-link" href="{{ . }}" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6.94 8.5A1.56 1.56 0 105.38 6.9 1.58 1.58 0 006.94 8.5zM5.65 10h2.58v8.34H5.65zm4.05 0h2.47v1.14h.04a2.7 2.7 0 012.44-1.35c2.6 0 3.08 1.76 3.08 4.04v4.51h-2.58v-4c0-.95-.02-2.17-1.28-2.17s-1.48 1.04-1.48 2.1v4.07H9.7z"/></svg>
        </a>
      {{ end }}
    </div>
  </section>
{{ end }}
