{{ define "extra_head" }}
  <style>
    @font-face {
      font-family: "Belisa_plumilla";
      font-style: normal;
      font-weight: 400 900;
      src: local("Belisa_plumilla"), local("Belisa Plumilla");
    }
    .menu-page,
    .menu-page * {
      box-sizing: border-box;
    }
    .menu-page {
      --dst-black: #17110d;
      --dst-ink: #2b1b12;
      --dst-paper: #ead3a2;
      --dst-paper-light: #f8e5b9;
      --dst-bone: #fff1cc;
      --dst-red: #8f2218;
      --dst-red-deep: #5a1712;
      --dst-gold: #d3a23c;
      --dst-shadow: rgba(23, 17, 13, 0.32);
      color: var(--dst-ink);
      display: grid;
      font-family: "Belisa_plumilla", "Belisa Plumilla", "Kaiti SC", "KaiTi", "STKaiti", "PingFang SC", "Microsoft YaHei", sans-serif;
      gap: 24px;
    }
    .menu-page input,
    .menu-page button {
      font: inherit;
    }
    .menu-gate {
      align-content: end;
      background:
        linear-gradient(180deg, rgba(255, 241, 204, 0.05), rgba(23, 17, 13, 0.18)),
        url("/images/food_menu/login_block.png") center / contain no-repeat;
      border: 0;
      border-radius: 0;
      box-shadow: none;
      display: grid;
      gap: 10px;
      justify-self: center;
      min-height: min(92vh, 760px);
      padding: clamp(290px, 48vw, 430px) clamp(28px, 7vw, 74px) clamp(52px, 10vw, 94px);
      position: relative;
      width: min(100%, 560px);
    }
    .menu-kicker {
      color: var(--dst-red);
      font-size: 0.95rem;
      font-weight: 900;
      margin: 0 0 8px;
      text-transform: uppercase;
    }
    .menu-gate h2,
    .menu-category-title,
    .menu-detail-panel h3 {
      color: var(--dst-black);
      margin: 0;
    }
    .menu-gate h2 {
      font-size: clamp(1.5rem, 4vw, 2rem);
      text-align: center;
    }
    .menu-gate > div,
    .menu-gate-form {
      margin-inline: auto;
      max-width: 330px;
      width: 100%;
    }
    .menu-gate > div {
      background: rgba(255, 241, 204, 0.72);
      border: 2px solid var(--dst-black);
      border-radius: 8px;
      box-shadow: 3px 3px 0 rgba(23, 17, 13, 0.16);
      padding: 10px 12px;
    }
    .menu-gate .menu-kicker,
    .menu-gate .menu-copy {
      text-align: center;
    }
    .menu-copy {
      color: #6c5540;
      margin: 0;
      max-width: 62ch;
    }
    .menu-gate-form {
      background: rgba(255, 241, 204, 0.82);
      border: 2px solid var(--dst-black);
      border-radius: 8px;
      box-shadow: 4px 4px 0 rgba(23, 17, 13, 0.2);
      display: grid;
      gap: 12px;
      padding: 14px;
    }
    .menu-label {
      color: #6c5540;
      font-size: 0.95rem;
      font-weight: 900;
    }
    .menu-input {
      background: #f7f7f4;
      border: 2px solid var(--dst-black);
      border-radius: 8px;
      color: var(--dst-black);
      padding: 10px 12px;
      text-align: center;
      width: 100%;
    }
    .menu-button {
      background: var(--dst-paper-light);
      border: 2px solid var(--dst-black);
      border-radius: 8px;
      box-shadow: 3px 3px 0 var(--dst-shadow);
      color: var(--dst-black);
      cursor: pointer;
      font-weight: 900;
      justify-self: start;
      padding: 9px 13px;
      transition: background-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }
    .menu-button:hover,
    .menu-button:focus-visible {
      background: var(--dst-gold);
      outline: none;
      transform: translate(-1px, -1px) rotate(-0.6deg);
      box-shadow: 5px 5px 0 var(--dst-shadow);
    }
    .menu-button-primary {
      background: var(--dst-red);
      color: var(--dst-bone);
    }
    .menu-status {
      color: var(--dst-red);
      min-height: 1.4rem;
      text-align: center;
    }
    .menu-app[hidden],
    .menu-gate[hidden] {
      display: none;
    }
    .menu-app {
      background:
        radial-gradient(circle at 12% 8%, rgba(143, 34, 24, 0.18), transparent 20%),
        radial-gradient(circle at 86% 18%, rgba(211, 162, 60, 0.2), transparent 22%),
        var(--dst-paper);
      border: 2px solid var(--dst-black);
      border-radius: 8px;
      box-shadow: 8px 8px 0 var(--dst-shadow);
      display: grid;
      gap: 22px;
      padding: clamp(16px, 3vw, 28px);
      position: relative;
    }
    .menu-app::before {
      background: var(--dst-red-deep);
      border: 2px solid var(--dst-black);
      content: "";
      height: 13px;
      left: -2px;
      position: absolute;
      right: -2px;
      top: -2px;
    }
    .menu-hero {
      display: grid;
      gap: 14px;
      position: relative;
      z-index: 1;
    }
    .menu-banner {
      border: 2px solid var(--dst-black);
      border-radius: 8px;
      box-shadow: 5px 5px 0 var(--dst-shadow);
      display: block;
      height: auto;
      width: 100%;
    }
    .menu-hero-copy {
      background: rgba(255, 241, 204, 0.82);
      border: 2px solid var(--dst-black);
      border-radius: 8px;
      display: grid;
      gap: 8px;
      padding: 14px;
    }
    .menu-title {
      color: var(--dst-black);
      font-size: clamp(2rem, 5vw, 3.4rem);
      line-height: 1;
      margin: 0;
    }
    .menu-topline {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: space-between;
    }
    .menu-header-strip {
      border: 2px solid var(--dst-black);
      border-radius: 8px;
      display: block;
      height: auto;
      max-height: 120px;
      object-fit: cover;
      width: 100%;
    }
    .menu-category-nav {
      background: var(--dst-black);
      border: 2px solid var(--dst-black);
      border-radius: 8px;
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(7, minmax(74px, 1fr));
      padding: 9px;
      position: sticky;
      top: 8px;
      z-index: 4;
    }
    .menu-category-button {
      align-items: center;
      background: var(--dst-paper-light);
      border: 2px solid var(--dst-black);
      border-radius: 8px;
      color: var(--dst-black);
      cursor: pointer;
      display: grid;
      gap: 4px;
      justify-items: center;
      min-height: 82px;
      padding: 6px;
      transition: background-color 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
    }
    .menu-category-button:hover,
    .menu-category-button:focus-visible,
    .menu-category-button.is-active {
      background: var(--dst-gold);
      box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.28);
      outline: none;
      transform: translateY(-2px) rotate(-0.8deg);
    }
    .menu-category-button img {
      display: block;
      height: 42px;
      object-fit: contain;
      width: 42px;
    }
    .menu-category-button span {
      font-size: 0.82rem;
      font-weight: 900;
      line-height: 1.05;
      text-align: center;
    }
    .menu-sections {
      display: grid;
      gap: 24px;
      position: relative;
      z-index: 1;
    }
    .menu-category {
      display: grid;
      gap: 14px;
      scroll-margin-top: 126px;
    }
    .menu-category-head {
      align-items: center;
      background: var(--dst-red);
      border: 2px solid var(--dst-black);
      border-radius: 8px;
      color: var(--dst-bone);
      display: grid;
      gap: 14px;
      grid-template-columns: 72px minmax(0, 1fr);
      padding: 10px 14px;
    }
    .menu-category-head img {
      background: var(--dst-paper-light);
      border: 2px solid var(--dst-black);
      border-radius: 999px;
      display: block;
      height: 72px;
      object-fit: contain;
      padding: 5px;
      width: 72px;
    }
    .menu-category-title {
      color: var(--dst-bone);
      font-size: 1.8rem;
      line-height: 1;
    }
    .menu-category-subtitle {
      color: rgba(255, 241, 204, 0.82);
      font-weight: 900;
      margin: 4px 0 0;
    }
    .menu-dishes {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .menu-dish {
      background: var(--dst-bone);
      border: 2px solid var(--dst-black);
      border-radius: 8px;
      box-shadow: 4px 4px 0 rgba(23, 17, 13, 0.14);
      color: var(--dst-black);
      display: grid;
      gap: 9px;
      min-height: 180px;
      padding: 14px;
      transition: background-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }
    .menu-dish:hover,
    .menu-dish:focus-within {
      background: #ffe6aa;
      box-shadow: 6px 6px 0 var(--dst-shadow);
      transform: translateY(-2px) rotate(-0.45deg);
    }
    .menu-dish-title {
      align-items: start;
      display: flex;
      gap: 10px;
      justify-content: space-between;
    }
    .menu-dish-title h3 {
      color: var(--dst-black);
      font-size: 1.22rem;
      line-height: 1.1;
      margin: 0;
    }
    .menu-dish-title span {
      color: #73533d;
      display: block;
      font-size: 0.85rem;
      font-weight: 900;
      margin-top: 3px;
    }
    .menu-dish-logo {
      border: 2px solid var(--dst-black);
      border-radius: 999px;
      flex: 0 0 auto;
      height: 38px;
      object-fit: contain;
      padding: 3px;
      width: 38px;
    }
    .menu-dish-detail {
      color: #59443b;
      font-size: 0.95rem;
      line-height: 1.45;
      margin: 0;
    }
    .menu-dish-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .menu-dish-tag {
      border: 1px solid rgba(43, 27, 18, 0.32);
      border-radius: 999px;
      color: #59443b;
      font-size: 0.78rem;
      font-weight: 900;
      line-height: 1;
      padding: 4px 8px;
    }
    .menu-dish-pairing {
      border-top: 1px dashed rgba(43, 27, 18, 0.35);
      color: var(--dst-red-deep);
      font-size: 0.88rem;
      font-weight: 900;
      margin: auto 0 0;
      padding-top: 8px;
    }
    @media (max-width: 760px) {
      .menu-category-nav {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        position: static;
      }
      .menu-category-head,
      .menu-dishes {
        grid-template-columns: 1fr;
      }
      .menu-category-head img {
        height: 58px;
        width: 58px;
      }
    }
  </style>
{{ end }}

{{ define "main" }}
  {{ $menuData := site.Data.partner_menu }}
  <article class="post menu-page">
    <section class="menu-gate" id="menu-gate" aria-labelledby="menu-gate-title">
      <div>
        <p class="menu-kicker">身份确认</p>
        <h2 id="menu-gate-title">先报上姓名</h2>
      </div>
      <p class="menu-copy">这张菜单只给对的人看。名字对上了，厨房小本本就会打开。</p>
      <form class="menu-gate-form" id="menu-gate-form">
        <label class="menu-label" for="menu-name-input">你的名字</label>
        <input class="menu-input" id="menu-name-input" autocomplete="name" placeholder="例如：Yuhang Wu" />
        <button class="menu-button menu-button-primary" type="submit">打开菜单</button>
        <p class="menu-status" id="menu-gate-status" aria-live="polite"></p>
      </form>
    </section>

    <section class="menu-app" id="menu-app" hidden>
      <header class="menu-hero">
        <img class="menu-banner" src="{{ $menuData.banner | relURL }}" alt="Don't Starve style food menu banner" />
        <div class="menu-hero-copy">
          <div class="menu-topline">
            <div>
              <p class="menu-kicker">Camp Kitchen</p>
              <h1 class="menu-title">{{ .Title }}</h1>
            </div>
            <button class="menu-button" id="menu-lock" type="button">锁上小本本</button>
          </div>
          <p class="menu-copy">{{ $menuData.menu_note | default .Summary }}</p>
        </div>
      </header>

      <nav class="menu-category-nav" id="menu-category-nav" aria-label="Menu categories"></nav>
      <img class="menu-header-strip" src="{{ $menuData.header | relURL }}" alt="" aria-hidden="true" />
      <div class="menu-sections" id="menu-sections"></div>
      <p class="text-link"><a href="{{ "/hodgepodge/" | relURL }}">返回 Hodgepodge</a></p>
    </section>
  </article>

  <script>
    (function () {
      const MENU_DATA = {{ $menuData | jsonify | safeJS }};
      const keeper = String(MENU_DATA.keeper || "").trim().toLowerCase();
      const storageKey = MENU_DATA.storage_key || "partner-menu-v2";
      const authKey = storageKey + ":auth";
      const categories = MENU_DATA.categories || [];

      const gate = document.getElementById("menu-gate");
      const app = document.getElementById("menu-app");
      const gateForm = document.getElementById("menu-gate-form");
      const nameInput = document.getElementById("menu-name-input");
      const gateStatus = document.getElementById("menu-gate-status");
      const navEl = document.getElementById("menu-category-nav");
      const sectionsEl = document.getElementById("menu-sections");

      function escapeHtml(value) {
        return String(value || "").replace(/[&<>"']/g, function (char) {
          return {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;"
          }[char];
        });
      }

      function revealApp() {
        gate.hidden = true;
        app.hidden = false;
        renderMenu();
      }

      function lockApp() {
        window.localStorage.removeItem(authKey);
        app.hidden = true;
        gate.hidden = false;
        nameInput.value = "";
        nameInput.focus();
      }

      function renderMenu() {
        navEl.innerHTML = categories.map(function (category, index) {
          return "<button class='menu-category-button" + (index === 0 ? " is-active" : "") + "' type='button' data-category='" + escapeHtml(category.key) + "'><img src='" + escapeHtml(category.logo) + "' alt='' /><span>" + escapeHtml(category.label) + "<br />" + escapeHtml(category.cn_label) + "</span></button>";
        }).join("");

        sectionsEl.innerHTML = categories.map(function (category) {
          const dishes = (category.items || []).map(function (item) {
            const tags = (item.tags || []).map(function (tag) {
              return "<span class='menu-dish-tag'>" + escapeHtml(tag) + "</span>";
            }).join("");
            return [
              "<article class='menu-dish'>",
              "<div class='menu-dish-title'>",
              "<div><h3>" + escapeHtml(item.name) + "</h3><span>" + escapeHtml(item.subtitle) + "</span></div>",
              "<img class='menu-dish-logo' src='" + escapeHtml(category.logo) + "' alt='' />",
              "</div>",
              "<p class='menu-dish-detail'>" + escapeHtml(item.detail) + "</p>",
              "<div class='menu-dish-tags'>" + tags + "</div>",
              "<p class='menu-dish-pairing'>搭配：" + escapeHtml(item.pairing || "看心情") + "</p>",
              "</article>"
            ].join("");
          }).join("");
          return [
            "<section class='menu-category' id='menu-section-" + escapeHtml(category.key) + "'>",
            "<header class='menu-category-head'>",
            "<img src='" + escapeHtml(category.logo) + "' alt='' />",
            "<div><h2 class='menu-category-title'>" + escapeHtml(category.label) + " / " + escapeHtml(category.cn_label) + "</h2><p class='menu-category-subtitle'>" + escapeHtml(category.note) + "</p></div>",
            "</header>",
            "<div class='menu-dishes'>",
            dishes,
            "</div>",
            "</section>"
          ].join("");
        }).join("");

        navEl.querySelectorAll("[data-category]").forEach(function (button) {
          button.addEventListener("click", function () {
            const key = button.getAttribute("data-category");
            navEl.querySelectorAll("[data-category]").forEach(function (item) {
              item.classList.toggle("is-active", item === button);
            });
            const target = document.getElementById("menu-section-" + key);
            if (target) {
              target.scrollIntoView({ behavior: "smooth", block: "start" });
            }
          });
        });
      }

      gateForm.addEventListener("submit", function (event) {
        event.preventDefault();
        const name = nameInput.value.trim().toLowerCase();
        if (name && name === keeper) {
          window.localStorage.setItem(authKey, "yes");
          gateStatus.textContent = "";
          revealApp();
          return;
        }
        gateStatus.textContent = "名字不对，小本本还不能打开。";
      });

      document.getElementById("menu-lock").addEventListener("click", lockApp);

      if (window.localStorage.getItem(authKey) === "yes") {
        revealApp();
      } else {
        gate.hidden = false;
        app.hidden = true;
      }
    })();
  </script>
{{ end }}
