{{ define "extra_head" }}
  {{ $menuData := site.Data.partner_menu }}
  <style>
    @font-face {
      font-family: "Belisa_plumilla";
      font-style: normal;
      font-weight: 400 900;
      src: local("Belisa_plumilla"), local("Belisa Plumilla");
    }
    .menu-page,
    .menu-page * {
      box-sizing: border-box;
    }
    .menu-page {
      --dst-black: #17110d;
      --dst-ink: #2b1b12;
      --dst-paper: #ead3a2;
      --dst-paper-light: #f8e5b9;
      --dst-bone: #fff1cc;
      --dst-red: #8f2218;
      --dst-red-deep: #5a1712;
      --dst-gold: #d3a23c;
      --dst-shadow: rgba(23, 17, 13, 0.32);
      color: var(--dst-ink);
      display: grid;
      font-family: "Belisa_plumilla", "Belisa Plumilla", "Kaiti SC", "KaiTi", "STKaiti", "PingFang SC", "Microsoft YaHei", sans-serif;
      gap: 24px;
    }
    .menu-page input,
    .menu-page button {
      font: inherit;
    }
    .menu-gate {
      align-content: start;
      background:
        url("{{ $menuData.login_frame | relURL }}") center / contain no-repeat;
      border: 0;
      border-radius: 0;
      box-shadow: none;
      display: grid;
      gap: 10px;
      justify-self: center;
      min-height: min(92vh, 760px);
      padding: clamp(120px, 24vw, 170px) clamp(52px, 10vw, 86px) clamp(52px, 10vw, 94px);
      position: relative;
      width: min(100%, 560px);
    }
    .menu-kicker {
      color: var(--dst-red);
      font-size: 0.95rem;
      font-weight: 900;
      margin: 0 0 8px;
      text-transform: uppercase;
    }
    .menu-category-title {
      color: var(--dst-black);
      margin: 0;
    }
    .menu-gate-form {
      margin-inline: auto;
      max-width: 330px;
      width: 100%;
    }
    .menu-gate-form {
      background: transparent;
      border: 0;
      box-shadow: none;
      display: grid;
      gap: 12px;
      padding: 14px;
    }
    .menu-label {
      color: #6c5540;
      font-size: 0.95rem;
      font-weight: 900;
      text-align: center;
    }
    .menu-input {
      background: transparent;
      border: 2px solid rgba(43, 27, 18, 0.34);
      border-radius: 8px;
      color: var(--dst-black);
      padding: 10px 12px;
      text-align: center;
      width: 100%;
    }
    .menu-button {
      background: var(--dst-paper-light);
      border: 2px solid var(--dst-black);
      border-radius: 8px;
      box-shadow: 3px 3px 0 var(--dst-shadow);
      color: var(--dst-black);
      cursor: pointer;
      font-weight: 900;
      justify-self: start;
      padding: 9px 13px;
      transition: background-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }
    .menu-button:hover,
    .menu-button:focus-visible {
      background: var(--dst-gold);
      outline: none;
      transform: translate(-1px, -1px) rotate(-0.6deg);
      box-shadow: 5px 5px 0 var(--dst-shadow);
    }
    .menu-button-primary {
      background:
        url("{{ $menuData.login_button | relURL }}") center / contain no-repeat;
      aspect-ratio: 3 / 2;
      border: 0;
      box-shadow: none;
      color: transparent;
      justify-self: stretch;
      min-height: 0;
      overflow: hidden;
      padding: 0;
      text-shadow: none;
      width: 100%;
    }
    .menu-button-primary:hover,
    .menu-button-primary:focus-visible {
      background:
        url("{{ $menuData.login_button | relURL }}") center / contain no-repeat;
      box-shadow: none;
    }
    .menu-status {
      color: var(--dst-red);
      min-height: 1.4rem;
      text-align: center;
    }
    .menu-app[hidden],
    .menu-gate[hidden] {
      display: none;
    }
    .menu-app {
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.88), rgba(242, 242, 239, 0.7)),
        radial-gradient(circle at 14% 10%, rgba(23, 17, 13, 0.04), transparent 24%),
        radial-gradient(circle at 88% 18%, rgba(120, 120, 112, 0.08), transparent 28%);
      border: 2px solid rgba(43, 27, 18, 0.24);
      border-radius: 8px;
      box-shadow: 5px 7px 0 rgba(23, 17, 13, 0.1);
      display: grid;
      gap: 22px;
      padding: clamp(16px, 3vw, 28px);
      position: relative;
    }
    .menu-app::before {
      border: 2px solid rgba(43, 27, 18, 0.16);
      border-radius: 8px;
      content: "";
      inset: 6px -7px -6px 6px;
      pointer-events: none;
      position: absolute;
      transform: rotate(-0.35deg);
    }
    .menu-hero {
      display: grid;
      gap: 14px;
      position: relative;
      z-index: 1;
    }
    .menu-banner {
      display: block;
      height: auto;
      width: 100%;
    }
    .menu-lock-row {
      display: flex;
      justify-content: flex-end;
    }
    .menu-category-nav {
      background: transparent;
      border: 0;
      border-radius: 8px;
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(auto-fit, minmax(74px, 1fr));
      padding: 0;
      position: sticky;
      top: 8px;
      z-index: 4;
    }
    .menu-category-button {
      align-items: center;
      background: transparent;
      border: 0;
      border-radius: 0;
      color: var(--dst-black);
      cursor: pointer;
      display: grid;
      gap: 4px;
      justify-items: center;
      min-height: 76px;
      padding: 6px;
      transition: background-color 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
    }
    .menu-category-button:hover,
    .menu-category-button:focus-visible,
    .menu-category-button.is-active {
      background: transparent;
      box-shadow: none;
      outline: none;
      transform: translateY(-2px) rotate(-0.8deg);
    }
    .menu-category-button img {
      display: block;
      height: 50px;
      object-fit: contain;
      width: 50px;
    }
    .menu-category-button span {
      font-size: 0.82rem;
      font-weight: 900;
      line-height: 1.05;
      text-align: center;
    }
    .menu-sections {
      display: grid;
      gap: 24px;
      position: relative;
      z-index: 1;
    }
    .menu-category {
      display: grid;
      gap: 14px;
      scroll-margin-top: 126px;
    }
    .menu-category-head {
      align-items: center;
      background: rgba(246, 246, 244, 0.86);
      border: 2px solid rgba(43, 27, 18, 0.3);
      border-radius: 8px;
      color: var(--dst-black);
      display: grid;
      gap: 14px;
      grid-template-columns: 78px minmax(0, 1fr);
      padding: 10px 14px;
    }
    .menu-category-head img {
      display: block;
      height: 72px;
      object-fit: contain;
      width: 72px;
    }
    .menu-category-title {
      color: var(--dst-black);
      font-size: 1.8rem;
      line-height: 1;
    }
    .menu-dishes {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .menu-dish {
      align-items: center;
      background: rgba(255, 255, 255, 0.78);
      border: 2px solid rgba(43, 27, 18, 0.24);
      border-radius: 8px;
      box-shadow: 3px 4px 0 rgba(23, 17, 13, 0.06);
      color: var(--dst-black);
      display: flex;
      min-height: 74px;
      padding: 14px;
      transition: background-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }
    .menu-dish:hover,
    .menu-dish:focus-within {
      background: rgba(235, 235, 231, 0.9);
      box-shadow: 4px 5px 0 rgba(23, 17, 13, 0.1);
      transform: translateY(-2px) rotate(-0.45deg);
    }
    .menu-dish-title h3 {
      color: var(--dst-black);
      font-size: 1.22rem;
      line-height: 1.1;
      margin: 0;
    }
    .menu-info-panels {
      display: grid;
      gap: 18px;
      position: relative;
      z-index: 1;
    }
    .menu-nutrition-card {
      background: rgba(255, 255, 255, 0.76);
      border: 2px solid rgba(43, 27, 18, 0.24);
      border-radius: 8px;
      box-shadow: 3px 4px 0 rgba(23, 17, 13, 0.06);
      padding: clamp(14px, 2.5vw, 22px);
    }
    .menu-nutrition-card h2,
    .menu-nutrition-card h3 {
      color: var(--dst-black);
      line-height: 1;
      margin: 0;
    }
    .menu-nutrition-card h2 {
      font-size: 1.75rem;
    }
    .menu-nutrition-card h3 {
      font-size: 1.3rem;
      margin-top: 4px;
    }
    .menu-nutrition-note,
    .menu-goal-copy,
    .menu-source-list {
      color: #5e4b39;
      line-height: 1.6;
    }
    .menu-nutrition-note {
      margin: 8px 0 0;
    }
    .menu-goal-copy {
      margin: 12px 0 0;
    }
    .menu-target-grid {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      margin-top: 14px;
    }
    .menu-target-chip {
      background: rgba(235, 235, 231, 0.86);
      border: 2px solid rgba(43, 27, 18, 0.18);
      border-radius: 8px;
      padding: 8px 10px;
    }
    .menu-target-chip strong,
    .menu-target-chip span {
      display: block;
    }
    .menu-target-chip strong {
      color: var(--dst-red-deep);
      font-size: 0.82rem;
      line-height: 1.1;
      text-transform: uppercase;
    }
    .menu-target-chip span {
      color: var(--dst-black);
      font-size: 1.05rem;
      font-weight: 900;
      margin-top: 3px;
    }
    .menu-table-wrap {
      margin-top: 14px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .menu-macro-table {
      border-collapse: separate;
      border-spacing: 0 8px;
      min-width: 760px;
      width: 100%;
    }
    .menu-diet-table {
      min-width: 1120px;
    }
    .menu-macro-table th {
      color: var(--dst-red-deep);
      font-size: 0.84rem;
      line-height: 1.1;
      padding: 0 8px 2px;
      text-align: left;
    }
    .menu-macro-table td {
      background: rgba(246, 246, 244, 0.88);
      border-bottom: 2px solid rgba(43, 27, 18, 0.16);
      border-top: 2px solid rgba(43, 27, 18, 0.16);
      color: var(--dst-black);
      line-height: 1.25;
      padding: 9px 8px;
      vertical-align: top;
    }
    .menu-macro-table td:first-child {
      border-left: 2px solid rgba(43, 27, 18, 0.16);
      border-radius: 8px 0 0 8px;
      font-weight: 900;
    }
    .menu-macro-table td:last-child {
      border-radius: 0 8px 8px 0;
      border-right: 2px solid rgba(43, 27, 18, 0.16);
    }
    .menu-source-list {
      margin: 12px 0 0;
      padding-left: 20px;
    }
    @media (max-width: 760px) {
      .menu-category-nav {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        position: static;
      }
      .menu-category-head,
      .menu-dishes {
        grid-template-columns: 1fr;
      }
      .menu-category-head img {
        height: 58px;
        width: 58px;
      }
      .menu-nutrition-card h2 {
        font-size: 1.45rem;
      }
    }
  </style>
{{ end }}

{{ define "main" }}
  {{ $menuData := site.Data.partner_menu }}
  <article class="post menu-page">
    <section class="menu-gate" id="menu-gate" aria-label="登录菜单">
      <form class="menu-gate-form" id="menu-gate-form">
        <label class="menu-label" for="menu-name-input">你的名字</label>
        <input class="menu-input" id="menu-name-input" autocomplete="name" placeholder="例如：Yuhang Wu" />
        <button class="menu-button menu-button-primary" type="submit" aria-label="登录菜单"></button>
        <p class="menu-status" id="menu-gate-status" aria-live="polite"></p>
      </form>
    </section>

    <section class="menu-app" id="menu-app" hidden>
      <header class="menu-hero">
        <img class="menu-banner" src="{{ $menuData.banner | relURL }}" alt="营地菜单横幅" />
        <div class="menu-lock-row">
          <button class="menu-button" id="menu-lock" type="button">锁上小本本</button>
        </div>
      </header>

      <nav class="menu-category-nav" id="menu-category-nav" aria-label="菜单分类"></nav>
      <div class="menu-sections" id="menu-sections"></div>
      <div class="menu-info-panels" id="menu-info-panels"></div>
      <p class="text-link"><a href="{{ "/hodgepodge/" | relURL }}">返回杂物间</a></p>
    </section>
  </article>

  <script>
    (function () {
      const MENU_DATA = {{ $menuData | jsonify | safeJS }};
      const keeper = String(MENU_DATA.keeper || "").trim().toLowerCase();
      const storageKey = MENU_DATA.storage_key || "partner-menu-v2";
      const authKey = storageKey + ":auth";
      const categories = (MENU_DATA.categories || []).filter(function (category) {
        return (category.items || []).length > 0;
      });
      const nutrition = MENU_DATA.nutrition || {};

      const gate = document.getElementById("menu-gate");
      const app = document.getElementById("menu-app");
      const gateForm = document.getElementById("menu-gate-form");
      const nameInput = document.getElementById("menu-name-input");
      const gateStatus = document.getElementById("menu-gate-status");
      const navEl = document.getElementById("menu-category-nav");
      const sectionsEl = document.getElementById("menu-sections");
      const infoEl = document.getElementById("menu-info-panels");

      function escapeHtml(value) {
        return String(value || "").replace(/[&<>"']/g, function (char) {
          return {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;"
          }[char];
        });
      }

      function revealApp() {
        gate.hidden = true;
        app.hidden = false;
        renderMenu();
      }

      function lockApp() {
        window.localStorage.removeItem(authKey);
        app.hidden = true;
        gate.hidden = false;
        nameInput.value = "";
        nameInput.focus();
      }

      function renderMenu() {
        navEl.innerHTML = categories.map(function (category, index) {
          return "<button class='menu-category-button" + (index === 0 ? " is-active" : "") + "' type='button' data-category='" + escapeHtml(category.key) + "'><img src='" + escapeHtml(category.logo) + "' alt='' /><span>" + escapeHtml(category.label) + "</span></button>";
        }).join("");

        sectionsEl.innerHTML = categories.map(function (category) {
          const dishes = (category.items || []).map(function (item) {
            return [
              "<article class='menu-dish'>",
              "<div class='menu-dish-title'><h3>" + escapeHtml(item.name) + "</h3></div>",
              "</article>"
            ].join("");
          }).join("");
          return [
            "<section class='menu-category' id='menu-section-" + escapeHtml(category.key) + "'>",
            "<header class='menu-category-head'>",
            "<img src='" + escapeHtml(category.logo) + "' alt='' />",
            "<div><h2 class='menu-category-title'>" + escapeHtml(category.label) + "</h2></div>",
            "</header>",
            "<div class='menu-dishes'>",
            dishes,
            "</div>",
            "</section>"
          ].join("");
        }).join("");

        navEl.querySelectorAll("[data-category]").forEach(function (button) {
          button.addEventListener("click", function () {
            const key = button.getAttribute("data-category");
            navEl.querySelectorAll("[data-category]").forEach(function (item) {
              item.classList.toggle("is-active", item === button);
            });
            const target = document.getElementById("menu-section-" + key);
            if (target) {
              target.scrollIntoView({ behavior: "smooth", block: "start" });
            }
          });
        });

        renderNutrition();
      }

      function renderTargetChips(target) {
        const labels = {
          kcal: "热量",
          protein: "蛋白质",
          carbs: "碳水",
          fat: "脂肪",
          fibre: "膳食纤维"
        };
        return Object.keys(labels).map(function (key) {
          return [
            "<div class='menu-target-chip'>",
            "<strong>" + escapeHtml(labels[key]) + "</strong>",
            "<span>" + escapeHtml((target || {})[key] || "待定") + "</span>",
            "</div>"
          ].join("");
        }).join("");
      }

      function renderMacroRows(rows) {
        return (rows || []).map(function (row) {
          return [
            "<tr>",
            "<td>" + escapeHtml(row.food) + "</td>",
            "<td>" + escapeHtml(row.assumption) + "</td>",
            "<td>" + escapeHtml(row.kcal) + "</td>",
            "<td>" + escapeHtml(row.protein) + "</td>",
            "<td>" + escapeHtml(row.carbs) + "</td>",
            "<td>" + escapeHtml(row.fat) + "</td>",
            "<td>" + escapeHtml(row.df) + "</td>",
            "</tr>"
          ].join("");
        }).join("");
      }

      function renderDietRows(rows) {
        return (rows || []).map(function (row) {
          return [
            "<tr>",
            "<td>" + escapeHtml(row.day) + "</td>",
            "<td>" + escapeHtml(row.focus) + "</td>",
            "<td>" + escapeHtml(row.breakfast) + "</td>",
            "<td>" + escapeHtml(row.lunch) + "</td>",
            "<td>" + escapeHtml(row.dinner) + "</td>",
            "<td>" + escapeHtml(row.snack) + "</td>",
            "<td>" + escapeHtml(row.kcal) + "</td>",
            "<td>" + escapeHtml(row.protein) + "</td>",
            "<td>" + escapeHtml(row.carbs) + "</td>",
            "<td>" + escapeHtml(row.fat) + "</td>",
            "<td>" + escapeHtml(row.df) + "</td>",
            "</tr>"
          ].join("");
        }).join("");
      }

      function renderNutrition() {
        if (!nutrition.macros || !nutrition.macros.length) {
          infoEl.innerHTML = "";
          return;
        }

        const goal = nutrition.goal_review || {};
        const sources = (nutrition.sources || []).map(function (source) {
          return "<li>" + escapeHtml(source) + "</li>";
        }).join("");

        infoEl.innerHTML = [
          "<section class='menu-nutrition-card' aria-label='营养目标复核'>",
          "<h2>" + escapeHtml(goal.title || "目标复核") + "</h2>",
          "<p class='menu-goal-copy'>" + escapeHtml(goal.body) + "</p>",
          "<div class='menu-target-grid'>",
          renderTargetChips(goal.target || {}),
          "</div>",
          "</section>",
          "<section class='menu-nutrition-card' aria-label='每 100g 估算营养表'>",
          "<h2>" + escapeHtml(nutrition.title || "每 100g 估算营养表") + "</h2>",
          "<p class='menu-nutrition-note'>" + escapeHtml(nutrition.subtitle) + "</p>",
          "<div class='menu-table-wrap'>",
          "<table class='menu-macro-table'>",
          "<thead><tr><th>Food</th><th>Assumption</th><th>kcal / 100g</th><th>Protein</th><th>Carbs</th><th>Fat</th><th>DF</th></tr></thead>",
          "<tbody>",
          renderMacroRows(nutrition.macros),
          "</tbody>",
          "</table>",
          "</div>",
          sources ? "<ul class='menu-source-list'>" + sources + "</ul>" : "",
          "</section>",
          "<section class='menu-nutrition-card' aria-label='7 天可编辑饮食模板'>",
          "<h2>" + escapeHtml(nutrition.diet_title || "7 天可编辑饮食模板") + "</h2>",
          "<p class='menu-nutrition-note'>" + escapeHtml(nutrition.diet_subtitle) + "</p>",
          "<div class='menu-table-wrap'>",
          "<table class='menu-macro-table menu-diet-table'>",
          "<thead><tr><th>日期</th><th>训练</th><th>早餐</th><th>午餐</th><th>晚餐</th><th>加餐</th><th>kcal</th><th>Protein</th><th>Carbs</th><th>Fat</th><th>DF</th></tr></thead>",
          "<tbody>",
          renderDietRows(nutrition.diet_template || []),
          "</tbody>",
          "</table>",
          "</div>",
          "</section>"
        ].join("");
      }

      gateForm.addEventListener("submit", function (event) {
        event.preventDefault();
        const name = nameInput.value.trim().toLowerCase();
        if (name && name === keeper) {
          window.localStorage.setItem(authKey, "yes");
          gateStatus.textContent = "";
          revealApp();
          return;
        }
        gateStatus.textContent = "名字不对，小本本还不能打开。";
      });

      document.getElementById("menu-lock").addEventListener("click", lockApp);

      if (window.localStorage.getItem(authKey) === "yes") {
        revealApp();
      } else {
        gate.hidden = false;
        app.hidden = true;
      }
    })();
  </script>
{{ end }}
