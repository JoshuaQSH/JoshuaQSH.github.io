{{ define "main" }}
  <section class="home-latest-panel posts-panel">
    <div class="home-section-header">
      <h1>{{ .Title }}</h1>
      {{ with .Content }}
        <div class="section-intro">{{ . }}</div>
      {{ end }}
    </div>

    <div class="post-card-list">
      {{ range .Pages.ByDate.Reverse }}
        <article class="post-card">
          {{ with .Date }}<p class="post-card-date">{{ .Format "Jan 2, 2006" }}</p>{{ end }}
          <h2 class="post-card-title"><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
          {{ with .Params.tags }}
            <div class="tag-list">
              {{ range . }}
                <a class="tag-pill" href="{{ (printf "/tags/%s/" (. | urlize)) | relURL }}">#t{{ . }}</a>
              {{ end }}
            </div>
          {{ end }}
        </article>
      {{ else }}
        <article class="post-card">
          <h2 class="post-card-title">No posts yet.</h2>
        </article>
      {{ end }}
    </div>
  </section>
{{ end }}
