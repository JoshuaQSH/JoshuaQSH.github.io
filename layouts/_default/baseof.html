<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ block "title" . }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    <style>
      body {
        margin: 40px auto;
        max-width: 760px;
        padding: 0 16px;
        color: #1f2937;
        font-size: 18px;
        line-height: 1.6;
        font-family: "Times New Roman", Times, serif;
      }
      a { color: #1d4ed8; text-decoration: none; }
      a:hover { text-decoration: underline; }
      nav {
        margin-bottom: 32px;
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        gap: 14px;
      }
      .nav-link {
        color: #6b7280;
        font-size: 1rem;
        font-weight: 600;
        transition: color 0.2s ease;
      }
      .nav-link:hover {
        color: #7f66b5;
        text-decoration: none;
      }
      .nav-home {
        font-size: 1.12rem;
        font-weight: 700;
        color: #4b5563;
      }
      h1 { margin: 0; font-size: 1.9rem; line-height: 1.2; }
      h2 { margin-top: 0; }
      .meta { color: #6b7280; font-size: 0.9rem; }
      ul { padding-left: 20px; }
      .section-intro { margin-top: 12px; color: #4b5563; }
      .profile-hero {
        display: flex;
        align-items: center;
        gap: 24px;
        margin-bottom: 24px;
      }
      .profile-avatar {
        width: 120px;
        height: 120px;
        border-radius: 999px;
        object-fit: cover;
        border: 1px solid #e5e7eb;
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.1);
        flex-shrink: 0;
      }
      .profile-copy {
        min-width: 0;
      }
      .profile-title {
        margin: 8px 0 6px;
        color: #111827;
        font-weight: 600;
      }
      .profile-description {
        margin: 0;
        color: #4b5563;
      }
      .hodgepodge-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 24px;
      }
      .hodgepodge-card {
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        background: #ffffff;
        overflow: hidden;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .hodgepodge-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 24px rgba(15, 23, 42, 0.08);
      }
      .hodgepodge-link { display: block; color: inherit; text-decoration: none; }
      .hodgepodge-thumb img {
        width: 100%;
        height: auto;
        display: block;
      }
      .hodgepodge-body { padding: 16px; }
      .hodgepodge-body h2 { margin: 0 0 8px; font-size: 1.1rem; }
      .hodgepodge-body p { margin: 0 0 12px; color: #4b5563; }
      .hodgepodge-hero img {
        width: 100%;
        border-radius: 18px;
        border: 1px solid #e5e7eb;
        margin: 12px 0 24px;
      }
      @media (max-width: 640px) {
        body { margin: 24px auto; }
        nav { margin-bottom: 24px; }
        .profile-hero {
          flex-direction: column;
          align-items: flex-start;
          gap: 14px;
        }
        .profile-avatar {
          width: 96px;
          height: 96px;
        }
        .hodgepodge-grid { gap: 16px; }
      }
    </style>
  </head>
  <body>
    <nav>
      {{ range .Site.Menus.main }}
        <a class="nav-link{{ if eq .Identifier "home" }} nav-home{{ end }}" href="{{ .URL | relURL }}">{{ .Name }}</a>
      {{ end }}
    </nav>
    <main>
      {{ block "main" . }}{{ end }}
    </main>
  </body>
</html>
