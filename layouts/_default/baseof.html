<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ block "title" . }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    <style>
      :root {
        --page-bg: #ffffff;
        --panel-bg: #ffffff;
        --panel-soft: #f6f8fa;
        --border-color: #ded6ea;
        --text-main: #1f2937;
        --text-muted: #6b7280;
        --link-color: #1d4ed8;
        --link-hover: #b6a1db;
        --post-hover: #2f6fdd;
        --divider-color: #d0d7de;
      }
      body {
        margin: 40px auto;
        max-width: 820px;
        padding: 0 16px;
        background: var(--page-bg);
        color: var(--text-main);
        font-size: 19px;
        line-height: 1.72;
        font-family: "Times New Roman", Times, serif;
      }
      a { color: var(--link-color); text-decoration: none; }
      a:hover { text-decoration: underline; }
      nav {
        margin-bottom: 32px;
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        gap: 14px;
      }
      .nav-link {
        color: var(--text-muted);
        font-size: 1.02rem;
        font-weight: 600;
        transition: color 0.2s ease;
      }
      .nav-link:hover {
        color: var(--link-hover);
        text-decoration: none;
      }
      .nav-home {
        font-size: 1.2rem;
        font-weight: 700;
        color: #4b5563;
      }
      main {
        display: grid;
        gap: 0;
      }
      h1 { margin: 0; font-size: 2.55rem; line-height: 1.15; }
      h2 { margin-top: 0; font-size: 1.85rem; line-height: 1.2; }
      h3 { font-size: 1.4rem; line-height: 1.25; }
      .meta { color: var(--text-muted); font-size: 0.95rem; }
      ul { padding-left: 20px; }
      .section-intro { margin-top: 12px; color: #4b5563; }
      .home-hero-panel,
      .home-latest-panel {
        background: transparent;
        border: 0;
        border-radius: 0;
        box-shadow: none;
        padding: 0;
      }
      .home-hero-panel {
        background: var(--panel-soft);
        padding: 28px 30px;
      }
      .home-latest-panel,
      .posts-panel {
        border-top: 1px solid var(--divider-color);
        margin-top: 26px;
        padding-top: 28px;
      }
      .home-section-header {
        margin-bottom: 18px;
      }
      .home-section-header .section-intro,
      .home-section-header p {
        margin-bottom: 0;
      }
      .home-hero-copy p {
        margin-bottom: 0;
      }
      .profile-hero {
        display: flex;
        align-items: center;
        gap: 28px;
        margin-bottom: 14px;
      }
      .profile-avatar {
        width: 164px;
        height: 164px;
        border-radius: 999px;
        object-fit: cover;
        border: 1px solid #d9d2e6;
        box-shadow: 0 14px 28px rgba(27, 31, 35, 0.12);
        flex-shrink: 0;
      }
      .profile-copy {
        min-width: 0;
        flex: 1;
      }
      .profile-copy h1 {
        font-size: 3rem;
      }
      .profile-title {
        margin: 10px 0 8px;
        color: #111827;
        font-weight: 600;
        font-size: 1.18rem;
      }
      .profile-description {
        margin: 0;
        color: #4b5563;
        font-size: 1.08rem;
        line-height: 1.7;
      }
      .profile-links {
        display: flex;
        align-items: flex-end;
        flex-direction: column;
        gap: 10px;
        margin-left: auto;
      }
      .profile-icon-link {
        width: 38px;
        height: 38px;
        border-radius: 999px;
        border: 1px solid #d0d7de;
        background: #ffffff;
        color: #57606a;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: color 0.2s ease, border-color 0.2s ease, background-color 0.2s ease;
      }
      .profile-icon-link:hover {
        color: #24292f;
        border-color: #8c959f;
        background-color: #f6f8fa;
        text-decoration: none;
      }
      .profile-icon-link svg {
        width: 19px;
        height: 19px;
        fill: currentColor;
      }
      .post-card-list {
        display: grid;
        gap: 0;
      }
      .post-card {
        background: transparent;
        border: 0;
        border-bottom: 1px solid var(--divider-color);
        border-radius: 0;
        box-shadow: none;
        padding: 18px 0;
      }
      .post-card:last-child {
        border-bottom: 0;
        padding-bottom: 0;
      }
      .post-card-date {
        color: var(--text-muted);
        font-size: 0.92rem;
        margin: 0 0 8px;
      }
      .post-card-heading {
        align-items: center;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 10px;
      }
      .post-card-title {
        margin: 0;
      }
      .post-card-title a {
        color: #111827;
        transition: color 0.2s ease;
      }
      .post-card-title a:hover {
        color: var(--post-hover);
        text-decoration: none;
      }
      .post-card-summary {
        color: #4b5563;
        margin: 0 0 12px;
      }
      .post-card-flag {
        align-items: center;
        color: #4b5563;
        display: inline-flex;
        font-size: 0.88rem;
        gap: 5px;
        line-height: 1;
        white-space: nowrap;
      }
      .post-card-flag svg {
        fill: currentColor;
        height: 13px;
        width: 13px;
      }
      .tag-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .tag-pill {
        background: transparent;
        border: 0;
        color: var(--text-muted);
        font-size: 0.9rem;
        line-height: 1;
        padding: 0;
      }
      .tag-pill:hover {
        background: transparent;
        color: var(--post-hover);
        text-decoration: none;
      }
      .posts-panel h1 {
        font-size: 2.2rem;
      }
      .about-contact {
        margin-top: 28px;
      }
      .about-contact-item {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        margin: 8px 0;
      }
      .about-contact-icon {
        width: 18px;
        height: 18px;
        color: #57606a;
        margin-top: 2px;
        flex-shrink: 0;
      }
      .about-contact-icon svg {
        width: 18px;
        height: 18px;
        fill: currentColor;
      }
      pre,
      pre.chroma,
      .highlight pre {
        background-color: #f6f8fa !important;
        border: 1px solid #d0d7de;
        border-radius: 6px;
        color: #24292f;
        font-size: 0.92rem;
        line-height: 1.45;
        margin: 16px 0;
        overflow: auto;
        padding: 16px;
      }
      .highlight {
        background: transparent !important;
      }
      code,
      pre,
      .highlight code {
        font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
      }
      p code,
      li code,
      td code {
        background-color: rgba(175, 184, 193, 0.2);
        border-radius: 6px;
        color: #24292f;
        font-size: 0.9em;
        padding: 0.2em 0.4em;
      }
      blockquote {
        border-left: 0.25em solid #d0d7de;
        color: #57606a;
        margin: 16px 0;
        padding: 0 1em;
      }
      .gh-alert {
        border-left-width: 0.28em;
        border-left-style: solid;
        border-radius: 6px;
        color: #24292f;
        margin: 16px 0;
        padding: 8px 14px;
      }
      .gh-alert > :last-child {
        margin-bottom: 0;
      }
      .gh-alert-title {
        align-items: center;
        display: flex;
        font-weight: 700;
        gap: 8px;
        margin: 0 0 6px;
      }
      .gh-alert-icon {
        display: inline-flex;
        font-size: 0.95em;
        line-height: 1;
      }
      .gh-alert-note {
        border-left-color: #0969da;
        background-color: #f6f8fa;
      }
      .gh-alert-tip {
        border-left-color: #1a7f37;
        background-color: #f6f8fa;
      }
      .gh-alert-important {
        border-left-color: #8250df;
        background-color: #f6f8fa;
      }
      .gh-alert-warning {
        border-left-color: #9a6700;
        background-color: #fff8c5;
      }
      .gh-alert-caution {
        border-left-color: #d1242f;
        background-color: #ffebe9;
      }
      .hodgepodge-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 24px;
      }
      .hodgepodge-card {
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        background: #ffffff;
        overflow: hidden;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .hodgepodge-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 24px rgba(15, 23, 42, 0.08);
      }
      .hodgepodge-link { display: block; color: inherit; text-decoration: none; }
      .hodgepodge-thumb img {
        width: 100%;
        height: auto;
        display: block;
      }
      .hodgepodge-body { padding: 16px; }
      .hodgepodge-body h2 { margin: 0 0 8px; font-size: 1.1rem; }
      .hodgepodge-body p { margin: 0 0 12px; color: #4b5563; }
      .hodgepodge-hero img {
        width: 100%;
        border-radius: 18px;
        border: 1px solid #e5e7eb;
        margin: 12px 0 24px;
      }
      @media (max-width: 640px) {
        body { margin: 24px auto; }
        nav { margin-bottom: 24px; }
        .home-hero-panel,
        .home-latest-panel {
          padding: 0;
        }
        .home-hero-panel {
          padding: 20px;
        }
        .profile-hero {
          flex-direction: column;
          align-items: flex-start;
          gap: 14px;
        }
        .profile-avatar {
          width: 120px;
          height: 120px;
        }
        .profile-links {
          margin-left: 0;
          align-items: flex-start;
          flex-direction: column;
        }
        .hodgepodge-grid { gap: 16px; }
        h1,
        .profile-copy h1 {
          font-size: 2.15rem;
        }
        h2 {
          font-size: 1.55rem;
        }
      }
    </style>
    {{ block "extra_head" . }}{{ end }}
  </head>
  <body>
    <nav>
      {{ range .Site.Menus.main }}
        <a class="nav-link{{ if eq .Identifier "home" }} nav-home{{ end }}" href="{{ .URL | relURL }}">{{ .Name }}</a>
      {{ end }}
    </nav>
    <main>
      {{ block "main" . }}{{ end }}
    </main>
    <script>
      (function () {
        const alertMap = {
          NOTE: { label: "Note", icon: "i" },
          TIP: { label: "Tip", icon: "!" },
          IMPORTANT: { label: "Important", icon: "*" },
          WARNING: { label: "Warning", icon: "!" },
          CAUTION: { label: "Caution", icon: "x" }
        };

        document.querySelectorAll("main blockquote").forEach(function (blockquote) {
          const firstParagraph = blockquote.querySelector("p:first-child");
          if (!firstParagraph) return;

          const text = firstParagraph.textContent.trim();
          const match = text.match(/^\[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]\s*(.*)$/i);
          if (!match) return;

          const kind = match[1].toUpperCase();
          const mapped = alertMap[kind];
          const rest = match[2];

          blockquote.classList.add("gh-alert", "gh-alert-" + kind.toLowerCase());

          const title = document.createElement("p");
          title.className = "gh-alert-title";
          title.innerHTML = '<span class="gh-alert-icon" aria-hidden="true">' + mapped.icon + '</span>' + mapped.label;
          blockquote.insertBefore(title, blockquote.firstChild);

          if (rest) {
            firstParagraph.textContent = rest;
          } else {
            firstParagraph.remove();
          }
        });
      })();
    </script>
    {{ block "extra_scripts" . }}{{ end }}
  </body>
</html>
