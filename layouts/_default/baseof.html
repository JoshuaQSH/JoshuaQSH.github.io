<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ block "title" . }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    <script>
      (function () {
        const storedTheme = localStorage.getItem("theme-preference");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const theme = storedTheme === "light" || storedTheme === "dark"
          ? storedTheme
          : (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
    <style>
      :root {
        --page-bg: #ffffff;
        --panel-bg: #ffffff;
        --panel-soft: #f6f8fa;
        --panel-elevated: #ffffff;
        --border-color: #ded6ea;
        --text-main: #1f2937;
        --text-strong: #111827;
        --text-muted: #6b7280;
        --text-subtle: #57606a;
        --link-color: #1d4ed8;
        --link-hover: #b6a1db;
        --post-hover: #2f6fdd;
        --divider-color: #d0d7de;
        --control-border: #d0d7de;
        --control-bg: #ffffff;
        --control-hover-bg: #f6f8fa;
        --control-hover-border: #8c959f;
        --code-bg: #f6f8fa;
        --inline-code-bg: rgba(175, 184, 193, 0.2);
        --shadow-soft: 0 14px 28px rgba(27, 31, 35, 0.12);
        --shadow-card: 0 12px 24px rgba(15, 23, 42, 0.08);
      }
      :root[data-theme="dark"] {
        --page-bg: #0d1117;
        --panel-bg: #0d1117;
        --panel-soft: #161b22;
        --panel-elevated: #161b22;
        --border-color: #30363d;
        --text-main: #e6edf3;
        --text-strong: #f0f6fc;
        --text-muted: #8b949e;
        --text-subtle: #8b949e;
        --link-color: #58a6ff;
        --link-hover: #a5d6ff;
        --post-hover: #79c0ff;
        --divider-color: #30363d;
        --control-border: #30363d;
        --control-bg: #161b22;
        --control-hover-bg: #21262d;
        --control-hover-border: #8b949e;
        --code-bg: #161b22;
        --inline-code-bg: rgba(110, 118, 129, 0.4);
        --shadow-soft: 0 14px 28px rgba(0, 0, 0, 0.38);
        --shadow-card: 0 12px 24px rgba(0, 0, 0, 0.28);
      }
      html {
        color-scheme: light;
      }
      html[data-theme="dark"] {
        color-scheme: dark;
      }
      body {
        margin: 40px auto;
        max-width: 820px;
        padding: 0 16px;
        background: var(--page-bg);
        color: var(--text-main);
        font-size: 19px;
        line-height: 1.72;
        font-family: "Times New Roman", Times, serif;
      }
      a { color: var(--link-color); text-decoration: none; }
      a:hover { text-decoration: underline; }
      .site-header {
        align-items: flex-start;
        display: flex;
        gap: 14px;
        justify-content: space-between;
        margin-bottom: 32px;
      }
      nav {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 14px;
        flex: 1;
        margin-bottom: 0;
        min-width: 0;
      }
      .nav-link {
        color: var(--text-muted);
        font-size: 1.02rem;
        font-weight: 600;
        transition: color 0.2s ease;
      }
      .nav-link:hover {
        color: var(--link-hover);
        text-decoration: none;
      }
      .nav-home {
        font-size: 1.2rem;
        font-weight: 700;
        color: var(--text-subtle);
      }
      .theme-toggle {
        align-items: center;
        background: var(--control-bg);
        border: 1px solid var(--control-border);
        border-radius: 999px;
        color: var(--text-subtle);
        cursor: pointer;
        display: inline-flex;
        flex-shrink: 0;
        height: 38px;
        justify-content: center;
        margin-left: auto;
        transition: color 0.2s ease, border-color 0.2s ease, background-color 0.2s ease, transform 0.2s ease;
        width: 38px;
      }
      .theme-toggle:hover {
        background: var(--control-hover-bg);
        border-color: var(--control-hover-border);
        color: var(--text-main);
        transform: translateY(-1px);
      }
      .theme-toggle svg {
        fill: currentColor;
        height: 18px;
        width: 18px;
      }
      main {
        display: grid;
        gap: 0;
      }
      h1 { margin: 0; font-size: 2.55rem; line-height: 1.15; }
      h2 { margin-top: 0; font-size: 1.85rem; line-height: 1.2; }
      h3 { font-size: 1.4rem; line-height: 1.25; }
      .meta { color: var(--text-muted); font-size: 0.95rem; }
      ul { padding-left: 20px; }
      .section-intro { margin-top: 12px; color: var(--text-muted); }
      .home-hero-panel,
      .home-latest-panel {
        background: transparent;
        border: 0;
        border-radius: 0;
        box-shadow: none;
        padding: 0;
      }
      .home-hero-panel {
        background: var(--panel-soft);
        padding: 28px 30px;
      }
      .home-latest-panel,
      .posts-panel {
        border-top: 1px solid var(--divider-color);
        margin-top: 26px;
        padding-top: 28px;
      }
      .home-section-header {
        margin-bottom: 18px;
      }
      .home-section-header .section-intro,
      .home-section-header p {
        margin-bottom: 0;
      }
      .home-hero-copy p {
        margin-bottom: 0;
      }
      .profile-hero {
        display: flex;
        align-items: center;
        gap: 28px;
        margin-bottom: 14px;
      }
      .profile-avatar {
        width: 164px;
        height: 164px;
        border-radius: 999px;
        object-fit: cover;
        border: 1px solid var(--border-color);
        box-shadow: var(--shadow-soft);
        flex-shrink: 0;
      }
      .profile-copy {
        min-width: 0;
        flex: 1;
      }
      .profile-copy h1 {
        font-size: 3rem;
      }
      .profile-title {
        margin: 10px 0 8px;
        color: var(--text-strong);
        font-weight: 600;
        font-size: 1.18rem;
      }
      .profile-description {
        margin: 0;
        color: var(--text-muted);
        font-size: 1.08rem;
        line-height: 1.7;
      }
      .profile-links {
        display: flex;
        align-items: flex-end;
        flex-direction: column;
        gap: 10px;
        margin-left: auto;
      }
      .profile-icon-link {
        width: 38px;
        height: 38px;
        border-radius: 999px;
        border: 1px solid var(--control-border);
        background: var(--control-bg);
        color: var(--text-subtle);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: color 0.2s ease, border-color 0.2s ease, background-color 0.2s ease;
      }
      .profile-icon-link:hover {
        color: var(--text-main);
        border-color: var(--control-hover-border);
        background-color: var(--control-hover-bg);
        text-decoration: none;
      }
      .profile-icon-link svg {
        width: 19px;
        height: 19px;
        fill: currentColor;
      }
      .post-card-list {
        display: grid;
        gap: 0;
      }
      .post-card {
        background: transparent;
        border: 0;
        border-bottom: 1px solid var(--divider-color);
        border-radius: 0;
        box-shadow: none;
        padding: 18px 0;
      }
      .post-card:last-child {
        border-bottom: 0;
        padding-bottom: 0;
      }
      .post-card-date {
        color: var(--text-muted);
        font-size: 0.92rem;
        margin: 0 0 8px;
      }
      .post-card-heading {
        align-items: center;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 10px;
      }
      .post-card-title {
        margin: 0;
      }
      .post-card-title a {
        color: var(--text-strong);
        transition: color 0.2s ease;
      }
      .post-card-title a:hover {
        color: var(--post-hover);
        text-decoration: none;
      }
      .post-card-summary {
        color: var(--text-muted);
        margin: 0 0 12px;
      }
      .post-card-flag {
        align-items: center;
        color: var(--text-muted);
        display: inline-flex;
        font-size: 0.88rem;
        gap: 5px;
        line-height: 1;
        white-space: nowrap;
      }
      .post-card-flag svg {
        fill: currentColor;
        height: 13px;
        width: 13px;
      }
      .tag-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .tag-pill {
        background: transparent;
        border: 0;
        color: var(--text-muted);
        font-size: 0.9rem;
        line-height: 1;
        padding: 0;
      }
      .tag-pill:hover {
        background: transparent;
        color: var(--post-hover);
        text-decoration: none;
      }
      .posts-panel h1 {
        font-size: 2.2rem;
      }
      .about-contact {
        margin-top: 28px;
      }
      .about-contact-item {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        margin: 8px 0;
      }
      .about-contact-icon {
        width: 18px;
        height: 18px;
        color: var(--text-subtle);
        margin-top: 2px;
        flex-shrink: 0;
      }
      .about-contact-icon svg {
        width: 18px;
        height: 18px;
        fill: currentColor;
      }
      pre,
      pre.chroma,
      .highlight pre {
        background-color: var(--code-bg) !important;
        border: 1px solid var(--divider-color);
        border-radius: 6px;
        color: var(--text-main);
        font-size: 0.92rem;
        line-height: 1.45;
        margin: 16px 0;
        overflow: auto;
        padding: 16px;
      }
      .highlight {
        background: transparent !important;
      }
      code,
      pre,
      .highlight code {
        font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
      }
      p code,
      li code,
      td code {
        background-color: var(--inline-code-bg);
        border-radius: 6px;
        color: var(--text-main);
        font-size: 0.9em;
        padding: 0.2em 0.4em;
      }
      blockquote {
        border-left: 0.25em solid var(--divider-color);
        color: var(--text-subtle);
        margin: 16px 0;
        padding: 0 1em;
      }
      .gh-alert {
        border-left-width: 0.28em;
        border-left-style: solid;
        border-radius: 6px;
        color: var(--text-main);
        margin: 16px 0;
        padding: 8px 14px;
      }
      .gh-alert > :last-child {
        margin-bottom: 0;
      }
      .gh-alert-title {
        align-items: center;
        display: flex;
        font-weight: 500;
        gap: 8px;
        margin: 0 0 6px;
      }
      .gh-alert-icon {
        display: inline-flex;
        line-height: 1;
      }
      .gh-alert-icon svg {
        fill: currentColor;
        height: 16px;
        width: 16px;
      }
      .gh-alert-note {
        border-left-color: #0969da;
      }
      .gh-alert-tip {
        border-left-color: #1a7f37;
      }
      .gh-alert-important {
        border-left-color: #8250df;
      }
      .gh-alert-warning {
        border-left-color: #9a6700;
      }
      .gh-alert-caution {
        border-left-color: #d1242f;
      }
      .gh-alert-note > .gh-alert-title {
        color: #0969da;
      }
      .gh-alert-tip > .gh-alert-title {
        color: #1a7f37;
      }
      .gh-alert-important > .gh-alert-title {
        color: #8250df;
      }
      .gh-alert-warning > .gh-alert-title {
        color: #9a6700;
      }
      .gh-alert-caution > .gh-alert-title {
        color: #d1242f;
      }
      .hodgepodge-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 24px;
      }
      .hodgepodge-card {
        border: 1px solid var(--divider-color);
        border-radius: 16px;
        background: var(--panel-elevated);
        overflow: hidden;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .hodgepodge-card:hover {
        transform: translateY(-4px);
        box-shadow: var(--shadow-card);
      }
      .hodgepodge-link { display: block; color: inherit; text-decoration: none; }
      .hodgepodge-thumb img {
        width: 100%;
        height: auto;
        display: block;
      }
      .hodgepodge-body { padding: 16px; }
      .hodgepodge-body h2 { margin: 0 0 8px; font-size: 1.1rem; }
      .hodgepodge-body p { margin: 0 0 12px; color: var(--text-muted); }
      .hodgepodge-hero img {
        width: 100%;
        border-radius: 18px;
        border: 1px solid var(--divider-color);
        margin: 12px 0 24px;
      }
      @media (max-width: 640px) {
        body { margin: 24px auto; }
        .site-header { margin-bottom: 24px; }
        .home-hero-panel,
        .home-latest-panel {
          padding: 0;
        }
        .home-hero-panel {
          padding: 20px;
        }
        .profile-hero {
          flex-direction: column;
          align-items: flex-start;
          gap: 14px;
        }
        .profile-avatar {
          width: 120px;
          height: 120px;
        }
        .profile-links {
          margin-left: 0;
          align-items: flex-start;
          flex-direction: column;
        }
        .hodgepodge-grid { gap: 16px; }
        h1,
        .profile-copy h1 {
          font-size: 2.15rem;
        }
        h2 {
          font-size: 1.55rem;
        }
      }
    </style>
    {{ block "extra_head" . }}{{ end }}
  </head>
  <body>
    <header class="site-header">
      <nav>
        {{ range .Site.Menus.main }}
          <a class="nav-link{{ if eq .Identifier "home" }} nav-home{{ end }}" href="{{ .URL | relURL }}">{{ .Name }}</a>
        {{ end }}
      </nav>
      <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">
        <span id="theme-toggle-icon" aria-hidden="true"></span>
      </button>
    </header>
    <main>
      {{ block "main" . }}{{ end }}
    </main>
    <script>
      (function () {
        const root = document.documentElement;
        const toggle = document.getElementById("theme-toggle");
        const icon = document.getElementById("theme-toggle-icon");
        const lightIcon = '<svg viewBox="0 0 24 24" focusable="false"><path d="M12 4.75a.75.75 0 0 1 .75.75V7a.75.75 0 0 1-1.5 0V5.5a.75.75 0 0 1 .75-.75Zm0 11.5a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0V17a.75.75 0 0 1 .75-.75Zm7.25-5a.75.75 0 0 1 0 1.5h-1.5a.75.75 0 0 1 0-1.5h1.5Zm-11 0a.75.75 0 0 1 0 1.5h-1.5a.75.75 0 0 1 0-1.5h1.5Zm7.13-4.88a.75.75 0 0 1 1.06 0l1.06 1.06a.75.75 0 1 1-1.06 1.06l-1.06-1.06a.75.75 0 0 1 0-1.06ZM7.56 14.19a.75.75 0 0 1 1.06 0l1.06 1.06a.75.75 0 0 1-1.06 1.06L7.56 15.25a.75.75 0 0 1 0-1.06Zm8.12 2.12a.75.75 0 0 1 0-1.06l1.06-1.06a.75.75 0 1 1 1.06 1.06l-1.06 1.06a.75.75 0 0 1-1.06 0ZM8.62 7.43a.75.75 0 0 1 0 1.06L7.56 9.55A.75.75 0 0 1 6.5 8.49l1.06-1.06a.75.75 0 0 1 1.06 0ZM12 8.25a3.75 3.75 0 1 1 0 7.5 3.75 3.75 0 0 1 0-7.5Z"></path></svg>';
        const darkIcon = '<svg viewBox="0 0 24 24" focusable="false"><path d="M14.5 3.25a.75.75 0 0 1 .79.94 8.25 8.25 0 1 0 10.52 10.52.75.75 0 0 1 .94.79A9.75 9.75 0 1 1 14.5 3.25Z"></path></svg>';

        function getStoredTheme() {
          return localStorage.getItem("theme-preference");
        }

        function getPreferredTheme() {
          const stored = getStoredTheme();
          if (stored === "light" || stored === "dark") {
            return stored;
          }
          return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }

        function renderToggle(theme) {
          const nextTheme = theme === "dark" ? "light" : "dark";
          icon.innerHTML = theme === "dark" ? lightIcon : darkIcon;
          toggle.setAttribute("aria-label", "Switch to " + nextTheme + " mode");
          toggle.setAttribute("title", "Switch to " + nextTheme + " mode");
        }

        if (!toggle || !icon) return;

        toggle.addEventListener("click", function () {
          const current = root.getAttribute("data-theme") === "dark" ? "dark" : "light";
          const next = current === "dark" ? "light" : "dark";
          root.setAttribute("data-theme", next);
          localStorage.setItem("theme-preference", next);
          renderToggle(next);
        });

        const media = window.matchMedia("(prefers-color-scheme: dark)");
        const syncWithSystem = function (event) {
          const stored = getStoredTheme();
          if (stored === "light" || stored === "dark") return;
          const theme = event.matches ? "dark" : "light";
          root.setAttribute("data-theme", theme);
          renderToggle(theme);
        };

        if (typeof media.addEventListener === "function") {
          media.addEventListener("change", syncWithSystem);
        } else if (typeof media.addListener === "function") {
          media.addListener(syncWithSystem);
        }

        renderToggle(getPreferredTheme());
      })();
    </script>
    <script>
      (function () {
        const alertMap = {
          NOTE: {
            label: "Note",
            icon: '<svg class="octicon octicon-info" viewBox="0 0 16 16" width="16" height="16" aria-hidden="true" focusable="false"><path d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8Zm8-6.5a6.5 6.5 0 1 0 0 13 6.5 6.5 0 0 0 0-13ZM6.5 7.75A.75.75 0 0 1 7.25 7h1a.75.75 0 0 1 .75.75v2.75h.25a.75.75 0 0 1 0 1.5h-2a.75.75 0 0 1 0-1.5h.25v-2h-.25a.75.75 0 0 1-.75-.75ZM8 6a1 1 0 1 1 0-2 1 1 0 0 1 0 2Z"></path></svg>'
          },
          TIP: {
            label: "Tip",
            icon: '<svg class="octicon octicon-light-bulb" viewBox="0 0 16 16" width="16" height="16" aria-hidden="true" focusable="false"><path d="M8 1.5c-2.363 0-4 1.69-4 3.75 0 .984.424 1.625.984 2.304l.214.253c.223.264.47.556.673.848.284.411.537.896.621 1.49a.75.75 0 0 1-1.484.211c-.04-.282-.163-.547-.37-.847a8.456 8.456 0 0 0-.542-.68c-.084-.1-.173-.205-.268-.32C3.201 7.75 2.5 6.766 2.5 5.25 2.5 2.31 4.863 0 8 0s5.5 2.31 5.5 5.25c0 1.516-.701 2.5-1.328 3.259-.095.115-.184.22-.268.319-.207.245-.383.453-.541.681-.208.3-.33.565-.37.847a.751.751 0 0 1-1.485-.212c.084-.593.337-1.078.621-1.489.203-.292.45-.584.673-.848.075-.088.147-.173.213-.253.561-.679.985-1.32.985-2.304 0-2.06-1.637-3.75-4-3.75ZM5.75 12h4.5a.75.75 0 0 1 0 1.5h-4.5a.75.75 0 0 1 0-1.5ZM6 15.25a.75.75 0 0 1 .75-.75h2.5a.75.75 0 0 1 0 1.5h-2.5a.75.75 0 0 1-.75-.75Z"></path></svg>'
          },
          IMPORTANT: {
            label: "Important",
            icon: '<svg class="octicon octicon-report" viewBox="0 0 16 16" width="16" height="16" aria-hidden="true" focusable="false"><path d="M0 1.75C0 .784.784 0 1.75 0h12.5C15.216 0 16 .784 16 1.75v9.5A1.75 1.75 0 0 1 14.25 13H8.06l-2.573 2.573A1.458 1.458 0 0 1 3 14.543V13H1.75A1.75 1.75 0 0 1 0 11.25Zm1.75-.25a.25.25 0 0 0-.25.25v9.5c0 .138.112.25.25.25h2a.75.75 0 0 1 .75.75v2.19l2.72-2.72a.749.749 0 0 1 .53-.22h6.5a.25.25 0 0 0 .25-.25v-9.5a.25.25 0 0 0-.25-.25Zm7 2.25v2.5a.75.75 0 0 1-1.5 0v-2.5a.75.75 0 0 1 1.5 0ZM9 9a1 1 0 1 1-2 0 1 1 0 0 1 2 0Z"></path></svg>'
          },
          WARNING: {
            label: "Warning",
            icon: '<svg class="octicon octicon-alert" viewBox="0 0 16 16" width="16" height="16" aria-hidden="true" focusable="false"><path d="M6.457 1.047c.659-1.234 2.427-1.234 3.086 0l6.082 11.378A1.75 1.75 0 0 1 14.082 15H1.918a1.75 1.75 0 0 1-1.543-2.575Zm1.763.707a.25.25 0 0 0-.44 0L1.698 13.132a.25.25 0 0 0 .22.368h12.164a.25.25 0 0 0 .22-.368Zm.53 3.996v2.5a.75.75 0 0 1-1.5 0v-2.5a.75.75 0 0 1 1.5 0ZM9 11a1 1 0 1 1-2 0 1 1 0 0 1 2 0Z"></path></svg>'
          },
          CAUTION: {
            label: "Caution",
            icon: '<svg class="octicon octicon-stop" viewBox="0 0 16 16" width="16" height="16" aria-hidden="true" focusable="false"><path d="M4.47.22A.749.749 0 0 1 5 0h6c.199 0 .389.079.53.22l4.25 4.25c.141.14.22.331.22.53v6a.749.749 0 0 1-.22.53l-4.25 4.25A.749.749 0 0 1 11 16H5a.749.749 0 0 1-.53-.22L.22 11.53A.749.749 0 0 1 0 11V5c0-.199.079-.389.22-.53Zm.84 1.28L1.5 5.31v5.38l3.81 3.81h5.38l3.81-3.81V5.31L10.69 1.5ZM8 4a.75.75 0 0 1 .75.75v3.5a.75.75 0 0 1-1.5 0v-3.5A.75.75 0 0 1 8 4Zm0 8a1 1 0 1 1 0-2 1 1 0 0 1 0 2Z"></path></svg>'
          }
        };

        document.querySelectorAll("main blockquote").forEach(function (blockquote) {
          const firstParagraph = blockquote.querySelector("p:first-child");
          if (!firstParagraph) return;

          const text = firstParagraph.textContent.trim();
          const match = text.match(/^\[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]\s*(.*)$/i);
          if (!match) return;

          const kind = match[1].toUpperCase();
          const mapped = alertMap[kind];
          const rest = match[2];

          blockquote.classList.add("gh-alert", "gh-alert-" + kind.toLowerCase());

          const title = document.createElement("p");
          title.className = "gh-alert-title";
          title.innerHTML = '<span class="gh-alert-icon" aria-hidden="true">' + mapped.icon + "</span>" + mapped.label;
          blockquote.insertBefore(title, blockquote.firstChild);

          if (rest) {
            firstParagraph.textContent = rest;
          } else {
            firstParagraph.remove();
          }
        });
      })();
    </script>
    {{ block "extra_scripts" . }}{{ end }}
  </body>
</html>
